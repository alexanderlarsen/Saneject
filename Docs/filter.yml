apiRules:

  # Exclude anything tagged [EditorBrowsable(EditorBrowsableState.Never)]
  - exclude:
      hasAttribute:
        uid: System.ComponentModel.EditorBrowsableAttribute
        ctorArguments:
          - System.ComponentModel.EditorBrowsableState.Never

  # Include everything in the Experimental namespace
  - include:
      uidRegex: ^Plugins\.Saneject\.Experimental(\..*)?$

  - exclude:
      uidRegex: .*