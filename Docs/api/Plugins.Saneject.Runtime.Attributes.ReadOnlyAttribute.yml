  namespace: Plugins.Saneject.Runtime.Attributes
  summary: Marks a field as read-only in the Unity inspector.
  remarks: >-
    When applied to a serialized field, this attribute causes the field to appear grayed out and disabled in the inspector.

    Saneject automatically draws <xref href="Plugins.Saneject.Runtime.Attributes.InjectAttribute" data-throw-if-not-resolved="false"></xref> fields as read-only, but you can use this attribute independently on non-injected fields.
  example: []
  syntax:
    content: >-
      [AttributeUsage(AttributeTargets.Field)]

      public class ReadOnlyAttribute : PropertyAttribute
    content.vb: >-
      <AttributeUsage(AttributeTargets.Field)>

      Public Class ReadOnlyAttribute Inherits PropertyAttribute
