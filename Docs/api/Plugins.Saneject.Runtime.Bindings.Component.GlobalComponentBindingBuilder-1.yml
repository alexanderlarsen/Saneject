  namespace: Plugins.Saneject.Runtime.Bindings.Component
  summary: >-
    Builder for configuring global component bindings.

    Same as <xref href="Plugins.Saneject.Runtime.Bindings.Component.ComponentBindingBuilder%601" data-throw-if-not-resolved="false"></xref>, except this builder doesn't allow qualifiers and <xref href="Plugins.Saneject.Runtime.Proxy.RuntimeProxy%601" data-throw-if-not-resolved="false"></xref> bindings.

    Components bound with this builder are added to the declaring <xref href="Plugins.Saneject.Runtime.Scopes.Scope" data-throw-if-not-resolved="false"></xref> and added to the <xref href="Plugins.Saneject.Runtime.Scopes.GlobalScope" data-throw-if-not-resolved="false"></xref> at runtime before any Awake methods execute.
  example: []
  syntax:
    content: 'public class GlobalComponentBindingBuilder<TComponent> : BaseComponentBindingBuilder<TComponent> where TComponent : class'
    typeParameters:
    - id: TComponent
      description: The type of the component being bound.
