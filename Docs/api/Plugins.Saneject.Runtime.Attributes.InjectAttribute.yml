  assemblies:
  - Saneject.Runtime
  namespace: Plugins.Saneject.Runtime.Attributes
  summary: Marks a field or method for dependency injection by Saneject.
  remarks: >-
    Apply this attribute to a field, an auto-property backing field via <code>[field: Inject]</code>, or a method to declare an injection site.

    During injection, Saneject resolves matching bindings starting from the nearest scope at the same transform or above and falling back to parent scopes.

    Injected fields are displayed as read-only in Saneject-aware inspectors.
  example: []
  syntax:
    content: >-
      [AttributeUsage(AttributeTargets.Method|AttributeTargets.Field)]

      [UsedImplicitly(ImplicitUseTargetFlags.WithMembers)]

      public sealed class InjectAttribute : PropertyAttribute
    content.vb: >-
      <AttributeUsage(AttributeTargets.MethodOrAttributeTargets.Field)>

      <UsedImplicitly(ImplicitUseTargetFlags.WithMembers)>

      Public NotInheritable Class InjectAttribute Inherits PropertyAttribute
  inheritance:
  - System.Object
  - System.Attribute
  - UnityEngine.PropertyAttribute
