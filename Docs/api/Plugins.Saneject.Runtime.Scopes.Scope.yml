  assemblies:
  - Saneject.Runtime
  namespace: Plugins.Saneject.Runtime.Scopes
  summary: >-
    Base class for scopes that declare bindings for a portion of a <xref href="UnityEngine.GameObject" data-throw-if-not-resolved="false"></xref> hierarchy.

    During injection, Saneject resolves each injection site from the nearest scope at the same transform or above, then falls back to parent scopes when needed.
  remarks: >-
    At runtime, a <code>Scope</code> registers its serialized global components in <xref href="Plugins.Saneject.Runtime.Scopes.GlobalScope" data-throw-if-not-resolved="false"></xref> and swaps

    <xref href="Plugins.Saneject.Runtime.Proxy.RuntimeProxy%601" data-throw-if-not-resolved="false"></xref> placeholders on registered proxy swap targets during early startup.
  example: []
  syntax:
    content: >-
      [DisallowMultipleComponent]

      [DefaultExecutionOrder(-10000)]

      public abstract class Scope : MonoBehaviour
    content.vb: >-
      <DisallowMultipleComponent>

      <DefaultExecutionOrder(-10000)>

      Public MustInherit Class Scope Inherits MonoBehaviour
  inheritance:
  - System.Object
  - UnityEngine.Object
  - UnityEngine.Component
  - UnityEngine.Behaviour
  - UnityEngine.MonoBehaviour
