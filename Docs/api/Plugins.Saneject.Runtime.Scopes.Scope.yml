    ctor: UnityEngine.DisallowMultipleComponent.#ctor
    arguments: []
  - type: UnityEngine.DefaultExecutionOrder
    ctor: UnityEngine.DefaultExecutionOrder.#ctor(System.Int32)
    arguments:
    - type: System.Int32
      value: -10000
