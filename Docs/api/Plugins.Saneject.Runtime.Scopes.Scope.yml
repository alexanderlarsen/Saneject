  namespace: Plugins.Saneject.Runtime.Scopes
  summary: Registers a component for runtime global registration through <xref href="Plugins.Saneject.Runtime.Scopes.GlobalScope" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    During editor-time injection, Saneject resolves the target <code class="typeparamref">TConcrete</code> and serializes it on the declaring scope.

    During <xref href="Plugins.Saneject.Runtime.Scopes.Scope.Awake" data-throw-if-not-resolved="false"></xref>, the scope registers that component in <xref href="Plugins.Saneject.Runtime.Scopes.GlobalScope" data-throw-if-not-resolved="false"></xref> before runtime proxy swapping runs.

    This is commonly used so <xref href="Plugins.Saneject.Runtime.Proxy.RuntimeProxy%601" data-throw-if-not-resolved="false"></xref> can resolve the component through <xref href="Plugins.Saneject.Runtime.Proxy.RuntimeProxyResolveMethod.FromGlobalScope" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: 'protected GlobalComponentBindingBuilder<TConcrete> BindGlobal<TConcrete>() where TConcrete : Component'
    typeParameters:
    - id: TConcrete
      description: The <xref href="UnityEngine.Component" data-throw-if-not-resolved="false"></xref> type to bind globally.
    return:
      type: Plugins.Saneject.Runtime.Bindings.Component.GlobalComponentBindingBuilder{{TConcrete}}
      description: A fluent builder for configuring the global component binding.
    content.vb: Protected Function BindGlobal(Of TConcrete As Component)() As GlobalComponentBindingBuilder(Of TConcrete)
