  namespace: Plugins.Saneject.Runtime.Attributes
  summary: Marks an interface-typed member for Saneject's serialized-interface code generation.
  remarks: >-
    Apply this attribute to interface fields, interface arrays, interface lists, or auto-properties via <code>[field: SerializeInterface]</code>.

    Saneject generates hidden <xref href="UnityEngine.Object" data-throw-if-not-resolved="false"></xref> backing members plus serialization sync code so Unity can display and persist

    interface references in scenes and prefabs.
  example: []
  syntax:
    content: >-
      [AttributeUsage(AttributeTargets.Field)]

      public sealed class SerializeInterfaceAttribute : Attribute
