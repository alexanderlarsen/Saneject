  namespace: Plugins.Saneject.Editor.Inspectors
  summary: >-
    Provides UI drawing and validation logic for the custom Saneject inspector.

    Handles rendering of serialized properties with injection-aware read-only states,

    custom handling for <xref href="Plugins.Saneject.Runtime.Attributes.SerializeInterfaceAttribute" data-throw-if-not-resolved="false"></xref> fields, nested serializable types, and validation

    to ensure assigned objects implement expected interface types.
